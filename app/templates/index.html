{% extends "base.html" %}

{% block title %}AIS Ship Tracker{% endblock %}

{% block content %}
<div class="container">
    <h1>AIS Ship Tracker</h1>
    <p>Track ship positions from PostgreSQL data using Flask and Leaflet.</p>

    <div class="toolbar">
        <label for="date-filter">Date:</label>
        <input id="date-filter" type="date">
        <label for="vessel-filter">Vessel:</label>
        <select id="vessel-filter">
            <option value="">All vessels</option>
        </select>
        <label class="checkbox-label" for="latest-only-filter">
            <input id="latest-only-filter" type="checkbox">
            Latest position only
        </label>
        <button id="clear-date-btn" type="button">Clear Filters</button>
        <button id="refresh-btn" type="button">Refresh Data</button>
        <span id="status-text">Loading data...</span>
    </div>

    <div id="map"></div>

    <section class="table-section">
        <h2>Latest Ship Positions</h2>
        <div class="table-wrap">
            <table id="ships-table">
                <thead>
                    <tr>
                        <th>Vessel</th>
                        <th>MMSI</th>
                        <th>Latitude</th>
                        <th>Longitude</th>
                        <th>Speed</th>
                        <th>Course</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="ships-table-body"></tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
